<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEANSO VLOG POS Version 2.0 - Professional</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { 
            --primary: #05354a; 
            --accent: #27ae60; 
            --danger: #e74c3c; 
            --edit: #f39c12;
            --bg: #f4f7f6; 
        }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }        
        .dashboard-header { display: flex; align-items: center; justify-content: space-between; background: linear-gradient(90deg, #05354a 0%, #274359 100%); padding: 1px 15px; color: #fff; height: 50px; margin:0; }
        .nav-btn { border:none; background:rgba(255,255,255,0.1); color:#fff; padding: 8px 15px; border-radius: 4px; cursor:pointer; margin-left: 10px; transition: 0.3s; }
        .nav-btn:hover { background: rgba(255,255,255,0.2); }

        .app-container { display: flex; flex: 1; gap: 5px; padding: 10px; box-sizing: border-box; overflow: hidden; }
        .column { background: white; padding: 15px; display: flex; flex-direction: column; box-shadow: 0 2px 5px rgba(0,0,0,0.5); height: 100%; box-sizing: border-box; }
        
        .products-panel { flex: 1; border-top: 8px solid var(--primary); border-bottom: 8px solid var(--primary); border-left: 1px solid var(--primary); border-right: 1px solid var(--primary); }
        .cart-panel { flex: 1; border-top: 8px solid var(--accent);  border-bottom: 8px solid var(--accent); border-left: 1px solid var(--accent); border-right: 1px solid var(--accent); }
        .checkout-panel { flex: .5; border-top: 8px solid var(--edit); border-bottom: 8px solid var(--edit); border-left: 1px solid var(--edit); border-right: 1px solid var(--edit); }

        .scroll-list { flex: 1; overflow-y: auto; border: 1px solid #eee; margin-top: 10px; border-radius: 5px; }
        input, select, button { padding: 8px; margin: 5px 0; border: 1px solid #ddd; border-radius: 4px; }
        
        .product-item { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid #f9f9f9; }
        .btn-action { border: none; color: white; padding: 5px 10px; border-radius: 3px; cursor: pointer; margin-left: 3px; }
        
        .btn-complete { background: var(--accent); color: white; width: 100%; font-size: 1rem; cursor: pointer; padding: 10px; font-weight: bold; border: none; margin-top:10px; border-radius: 5px; transition: 0.2s; }
        .btn-complete:hover { background: #219150; }
        .btn-void { background: red; color: white; border:none; width: 100%; cursor:pointer; padding: 5px; margin-top: 5px;}

        .total-display { font-family: 'Arial', sans-serif; font-size: 1.5rem; color: RED; font-weight: bold; margin: 10px 0; border-top: 2px solid #eee; padding-top: 10px; text-align: right;}
        
        /* Modal General Styling */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background:rgba(0,0,0,0.8); }
        .modal-content { background: white; margin: 2% auto; padding: 20px; width: 90%; max-width: 850px; max-height: 85vh; overflow-y: auto;}

        /* Custom Alert Specific Styling */
        #alert-box { max-width: 350px; text-align: center; border-top: 10px solid var(--primary); }

        #receipt-print { display: none; font-family: 'Courier New', Courier, monospace; width: 58mm; padding: 2mm; color: #000; }
        @media print {
            body * { visibility: hidden; }
            #receipt-print, #receipt-print * { visibility: visible; }
            #receipt-print { position: absolute; left: 0; top: 0; width: 58mm; display: block !important; }
        }
        
        .input-group { position: relative; width: 250px; }
        .input-group input { width: 91%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; outline: none; font-size: 16px; transition: border-color 0.3s; }
        .input-group label { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); background: white; padding: 0 5px; color: #999; pointer-events: none; transition: 0.3s ease all; }
        .input-group:hover label, .input-group input:focus + label, .input-group input:not(:placeholder-shown) + label { top: 0; font-size: 12px; color: #007bff; font-weight: bold; }
        .input-group input:focus { border-color: #007bff; }
    </style>
</head>
<body>

<h3 class="dashboard-header">
    <span><i class="fas fa-cash-register"></i> SEANSO VLOG POS <small style="font-weight: normal; opacity: 0.8; font-size: 0.7em;">v2.0</small></span>
    <div>
        <button class="nav-btn" onclick="toggleModal('inventoryModal')"><i class="fas fa-boxes"></i> Stocks</button>
        <button class="nav-btn" onclick="toggleModal('salesModal')"><i class="fas fa-file-invoice-dollar"></i> Reports</button>
    </div>
</h3>

<div class="app-container">
    <section class="column products-panel">
        <h3 id="formTitle">Inventory Manager</h3>
        <input type="hidden" id="pId">
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 5px;">
            <div class="input-group"><input type="text" id="pBarcode" maxlength="15" placeholder=" "><label>Barcode/SKU</label></div>
            <div class="input-group"><input type="text" id="pName" maxlength="21" placeholder=" "><label>Item Name</label></div>
            <div class="input-group"><input type="number" id="pPrice" placeholder=" "><label>Price</label></div>
            <div class="input-group"><input type="number" id="pStock" placeholder=" "><label>Stock Qty</label></div>
        </div>
        <button onclick="saveProduct()" id="btnSave" style="background: var(--primary); color: white; cursor:pointer; font-weight:bold;">SAVE PRODUCT</button>
        <button onclick="resetForm()" id="btnCancel" style="display:none; background: #95a5a6; color:white;">CANCEL</button>
        <hr style="width:100%; margin: 15px 0; border: 0; border-top: 1px solid #eee;">
        Quick Search
        <input type="text" id="pSearch" placeholder="🔍 Search Inventory..." oninput="renderProducts()" style="width: 100%; box-sizing: border-box;">
        <div id="productList" class="scroll-list"></div>
    </section>

    <section class="column cart-panel">
        <h3>Cart Order</h3>
        <input type="text" id="cartScanner" placeholder="Scan Barcode / Search..." style="width: 100%; background: #FFF0F0; font-weight: bold; border: 2px solid var(--accent); box-sizing: border-box;" onkeypress="if(event.key==='Enter') addToCart(this.value)">
        <div style="display: flex; font-size: 11px; font-weight: bold; color: #777; padding: 10px 10px 0;">
            <span style="flex: 2;">ITEM</span>
            <span style="flex: 1; text-align: center;">PRICE</span>
            <span style="flex: 1; text-align: center;">QTY</span>
            <span style="flex: 1; text-align: right;">TOTAL</span>
            <span style="width: 30px;"></span>
        </div>
        <div id="cartItems" class="scroll-list"></div>
        <div style="padding: 10px; background: #f8f9fa;">
            <p style="margin:0">Total Items: <b id="summaryQty">0</b></p>
            <button class="btn-void" onclick="voidCart()">VOID TRANSACTION</button>
        </div>
    </section>
    <section class="column checkout-panel">
        <h3>Payment</h3>
        <div class="total-display">TOTAL : ₱<span id="summaryTotal">0.00</span></div>
        <div style="background:#E8E8E8; padding: 5px; border-radius: 5px; flex: 1;">
            <label>Payment Method:</label>
            <select id="payMethod" style="width: 100%; margin-bottom: 15px;">
                <option value="Cash">Cash</option>
                <option value="GCash">GCash</option>
                <option value="Bank Transfer">Bank Transfer</option>
				<option value="Debit Card">Debit Card</option>
			</select>
            <button id="discountBtn" onclick="askDiscountPassword()" style="background:#fff; border: 1px solid var(--accent); color: var(--accent); cursor: pointer; padding: 10px; font-weight: bold; width:100%">
                <i class="fas fa-percents"></i> APPLY 20% DISCOUNT
            </button>
            <hr>
            <label>Cash Received:</label>
            <input type="number" id="cashRendered" placeholder="0.00" style="width:100%; font-size: 1.1rem; padding:5PX; border: 2px solid var(--primary); box-sizing: border-box; text-align: right;" oninput="updateTotals()">
            <div style="display: flex; justify-content: space-between; margin: 5px 0;"><span>Subtotal:</span><span>₱<span id="summarySubtotal">0.00</span></span></div>
            <div style="display: flex; justify-content: space-between; margin: 5px 0; color: var(--danger);"><span>Discount:</span><span>-₱<span id="discountLabel">0.00</span></span></div>
            <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 5px; font-size: 1rem;"><b>Change:</b><b id="changeDisplay" style="color:var(--accent)">0.00</b></div>
        </div>
        <button class="btn-complete" onclick="processTransaction()"><i class="fas fa-print"></i> FINISH & PRINT</button>
    </section>
</div>

<div id="alertModal" class="modal">
    <div id="alert-box" class="modal-content">
        <div id="alertIcon" style="font-size: 3rem; margin-bottom: 15px;"></div>
        <h3 id="alertMsg" style="color: #333; margin-bottom: 20px;"></h3>
        <button onclick="closeAlert()" style="background: var(--primary); color: white; padding: 12px; border: none; width: 100%; cursor:pointer; font-weight:bold; border-radius: 4px;">CONTINUE</button>
    </div>
</div>

<div id="receipt-print"></div>

<div id="salesModal" class="modal">
    <div class="modal-content">
        <button onclick="toggleModal('salesModal')" style="float:right; background:var(--danger); color:white; border:none; padding:5px 10px; cursor:pointer;">Close</button>
        <h2>Sales History</h2>
        <div style="margin-bottom: 15px; display: flex; gap: 10px; align-items: center;">
            <label>Filter View:</label>
            <select id="salesFilter" onchange="loadSalesHistory()">
                <option value="daily">Today's Sales</option>
                <option value="all">All Time History</option>
            </select>
            <button onclick="exportToCSV()" style="background: var(--accent); color: white; border:none; padding: 10px; cursor:pointer; border-radius:4px;"><i class="fas fa-file-export"></i> EXPORT TO CSV</button>
        </div>
        <table width="100%" border="1" style="border-collapse: collapse; text-align:center;">
            <thead><tr style="background:#2c3e50; color:white;"><th style="padding:10px;">Date/Time</th><th>Items</th><th>Total</th><th>Method</th></tr></thead>
            <tbody id="salesBody" style="text-align:center;"></tbody>
        </table>
    </div>
</div>

<div id="inventoryModal" class="modal">
    <div class="modal-content">
        <button onclick="toggleModal('inventoryModal')" style="float:right; background:var(--danger); color:white; border:none; padding:5px 10px; cursor:pointer;">Close</button>
        <h2>Current Stock Status</h2>
        <table width="100%" border="1" style="border-collapse: collapse; margin-top:10px; align-items: center;">
            <thead><tr style="background:#eee;" ><th>Barcode</th><th>Item</th><th>Price</th><th>In Stock</th><th>Sold</th></tr></thead>
            <tbody id="invBody"  style="text-align:center;"></tbody>
        </table>
    </div>
</div>

<script>
let db;
let cart = [];
let discountApplied = false;
const DISCOUNT_PASS = "1234";

// Prevent accidental exit
window.addEventListener('beforeunload', (e) => { e.preventDefault(); e.returnValue = ''; });

// --- CUSTOM MODAL ALERT FUNCTION ---
function showAlert(msg, type = 'info') {
    const modal = document.getElementById('alertModal');
    const icon = document.getElementById('alertIcon');
    const text = document.getElementById('alertMsg');
    
    text.innerText = msg;
    if(type === 'error') icon.innerHTML = '<i class="fas fa-times-circle" style="color:var(--danger)"></i>';
    else if(type === 'success') icon.innerHTML = '<i class="fas fa-check-circle" style="color:var(--accent)"></i>';
    else icon.innerHTML = '<i class="fas fa-info-circle" style="color:var(--edit)"></i>';
    
    modal.style.display = "block";
}

function closeAlert() { document.getElementById('alertModal').style.display = "none"; }

// --- DATABASE INIT ---
const request = indexedDB.open("MasterKurtDB", 1);
request.onupgradeneeded = e => {
    db = e.target.result;
    db.createObjectStore("products", { keyPath: "id", autoIncrement: true });
    db.createObjectStore("sales", { keyPath: "id", autoIncrement: true });
};
request.onsuccess = e => { db = e.target.result; renderProducts(); document.getElementById('cartScanner').focus(); };

// --- PRODUCT CRUD ---
function saveProduct() {
    const id = document.getElementById('pId').value;
    const product = {
        barcode: document.getElementById('pBarcode').value.trim(),
        name: document.getElementById('pName').value.trim(),
        price: parseFloat(document.getElementById('pPrice').value || 0),
        stock: parseInt(document.getElementById('pStock').value || 0)
    };
    if(!product.barcode || !product.name) return showAlert("Fields cannot be empty. Please provide a Barcode/SKU, Item Name, Price, and Quantity.", "error");
    
    const tx = db.transaction("products", "readwrite");
    const store = tx.objectStore("products");
    id ? (product.id = parseInt(id), store.put(product)) : (product.sold = 0, store.add(product));
    tx.oncomplete = () => { resetForm(); renderProducts(); showAlert("Inventory Updated!", "success"); };
}

function renderProducts() {
    const list = document.getElementById('productList');
    const search = document.getElementById('pSearch').value.toLowerCase();
    list.innerHTML = "";
    db.transaction("products").objectStore("products").openCursor().onsuccess = e => {
        const cursor = e.target.result;
        if(cursor) {
            const v = cursor.value;
            if(v.name.toLowerCase().includes(search) || v.barcode.includes(search)) {
                const stockColor = v.stock <= 5 ? 'color:red; font-weight:bold' : '';
                list.innerHTML += `
                <div class="product-item">
                    <div onclick="addToCart('${v.barcode}')" style="cursor:pointer; flex:1">
                        <b>${v.name}</b><br>
                        <small>₱${v.price.toFixed(2)} | <span style="${stockColor}">Stock: ${v.stock}</span></small>
                    </div>
                    <div>
                        <button class="btn-action" style="background:var(--edit)" onclick="editProduct(${v.id})"><i class="fas fa-edit"></i></button>
                        <button class="btn-action" style="background:var(--danger)" onclick="deleteProduct(${v.id})"><i class="fas fa-trash"></i></button>
                    </div>
                </div>`;
            }
            cursor.continue();
        }
    };
}

function editProduct(id) {
    db.transaction("products").objectStore("products").get(id).onsuccess = e => {
        const p = e.target.result;
        document.getElementById('pId').value = p.id;
        document.getElementById('pBarcode').value = p.barcode;
        document.getElementById('pName').value = p.name;
        document.getElementById('pPrice').value = p.price;
        document.getElementById('pStock').value = p.stock;
        document.getElementById('btnCancel').style.display = "block";
        document.getElementById('formTitle').innerText = "Edit Product";
    };
}

function resetForm() {
    ['pId','pBarcode','pName','pPrice','pStock'].forEach(i => document.getElementById(i).value = "");
    document.getElementById('btnCancel').style.display = "none";
    document.getElementById('formTitle').innerText = "Inventory Manager";
}

function deleteProduct(id) {
    if(confirm("Delete item forever?")) {
        const tx = db.transaction("products", "readwrite");
        tx.objectStore("products").delete(id);
        tx.oncomplete = () => renderProducts();
    }
}

// --- CART LOGIC ---
function addToCart(bc) {
    if(!bc) return;
    const tx = db.transaction("products", "readonly");
    const store = tx.objectStore("products");
    let found = false;

    store.openCursor().onsuccess = e => {
        const cursor = e.target.result;
        if(cursor) {
            if(cursor.value.barcode === bc) {
                found = true;
                const p = cursor.value;
                if(p.stock <= 0) return showAlert(" Item is out of stock!", "error");
                
                const itemInCart = cart.find(i => i.barcode === bc);
                if(itemInCart) {
                    if(itemInCart.qty + 1 > p.stock) return showAlert("Insufficient stock! The quantity entered exceeds the available inventory.", "error");
                    itemInCart.qty++;
                } else {
                    cart.push({...p, qty: 1});
                }
                renderCart();
                document.getElementById('cartScanner').value = "";
                document.getElementById('cartScanner').focus();
                return;
            }
            cursor.continue();
        } else if (!found) {
            showAlert("Barcode not found!", "error");
            document.getElementById('cartScanner').value = "";
        }
    };
}

function renderCart() {
    const cont = document.getElementById('cartItems');
    cont.innerHTML = cart.map((item, idx) => `
        <div class="product-item">
            <span style="flex:2"><b>${item.name}</b></span>
            <span style="flex:1; text-align:center">₱${item.price}</span>
            <input type="number" value="${item.qty}" style="width:45px" onchange="updateCartQty(${idx}, this.value)">
            <span style="flex:1; text-align:right">₱${(item.price * item.qty).toFixed(2)}</span>
            <button onclick="cart.splice(${idx},1); renderCart()" style="background:none; border:none; color:red; cursor:pointer; font-size:1.2rem">×</button>
        </div>
    `).join('');
    updateTotals();
}

function updateCartQty(idx, qty) {
    qty = parseInt(qty);
    if(qty > 0) {
        db.transaction("products").objectStore("products").get(cart[idx].id).onsuccess = e => {
            if(qty > e.target.result.stock) {
                showAlert("Stock Limit Reached! Please adjust the quantity to match available inventory.", "error");
				
                cart[idx].qty = e.target.result.stock;
            } else {
                cart[idx].qty = qty;
            }
            renderCart();
        };
    }
}

function updateTotals() {
    const sub = cart.reduce((sum, i) => sum + (i.price * i.qty), 0);
    const discAmount = discountApplied ? (sub * 0.20) : 0;
    const total = sub - discAmount;
    const cash = parseFloat(document.getElementById('cashRendered').value || 0);

    document.getElementById('summaryQty').innerText = cart.reduce((sum, i) => sum + i.qty, 0);
    document.getElementById('summarySubtotal').innerText = sub.toLocaleString(undefined, {minimumFractionDigits: 2});
    document.getElementById('discountLabel').innerText = discAmount.toLocaleString(undefined, {minimumFractionDigits: 2});
    document.getElementById('summaryTotal').innerText = total.toLocaleString(undefined, {minimumFractionDigits: 2});
    
    const change = cash - total;
    const changeEl = document.getElementById('changeDisplay');
    changeEl.innerText = change >= 0 ? change.toFixed(2) : "0.00";
    changeEl.style.color = change >= 0 ? "var(--accent)" : "var(--danger)";
}

function askDiscountPassword() {
    if (discountApplied) {
        if (confirm("Remove 20% discount?")) {
            discountApplied = false;
            document.getElementById('discountBtn').innerHTML = '<i class="fas fa-percent"></i> APPLY 20% DISCOUNT';
            updateTotals();
        }
        return;
    }
    const pass = prompt("Enter Manager PIN:");
    if (pass === DISCOUNT_PASS) {
        discountApplied = true;
        document.getElementById('discountBtn').innerHTML = '<i class="fas fa-check-circle"></i> DISCOUNT APPLIED';
        updateTotals();
        showAlert("Access Granted. Discount Applied!", "success");
    } else if (pass !== null) {
        showAlert("Incorrect Password.Please Try Again", "error");
    }
}

function voidCart() {
    if(cart.length > 0 && confirm("Clear entire order?")) {
        cart = [];
        discountApplied = false;
        document.getElementById('discountBtn').innerHTML = '<i class="fas fa-percent"></i> APPLY 20% DISCOUNT';
        document.getElementById('cashRendered').value = "";
        renderCart();
    }
}

// --- TRANSACTION ---
function processTransaction() {
    if(!cart.length) return showAlert("The cart is empty. Please select products to complete the transaction.", "info");
    
    const sub = cart.reduce((sum, i) => sum + (i.price * i.qty), 0);
    const disc = discountApplied ? (sub * 0.20) : 0;
    const total = sub - disc;
    const cash = parseFloat(document.getElementById('cashRendered').value || 0);

    if(cash < total) return showAlert("Insufficient cash. Please enter the correct amount to proceed with checkout.", "error");

    const sale = { timestamp: Date.now(), items: [...cart], subtotal: sub, total, discount: disc, cash, change: cash - total, method: document.getElementById('payMethod').value };

    const tx = db.transaction(["sales", "products"], "readwrite");
    tx.objectStore("sales").add(sale);
    const pStore = tx.objectStore("products");

    cart.forEach(item => {
        pStore.get(item.id).onsuccess = e => {
            const p = e.target.result;
            if(p) { p.stock -= item.qty; p.sold = (p.sold || 0) + item.qty; pStore.put(p); }
        };
    });

    tx.oncomplete = () => {
        printReceipt(sale);
        cart = [];
        discountApplied = false;
        document.getElementById('discountBtn').innerHTML = '<i class="fas fa-percent"></i> APPLY 20% DISCOUNT';
        renderCart();
        renderProducts();
        document.getElementById('cashRendered').value = "";
        document.getElementById('cartScanner').focus();
    };
}

function printReceipt(s) {
    const div = document.getElementById('receipt-print');
    div.innerHTML = `
        <div style="text-align:center; text-transform: uppercase;"><strong>SEANSO VLOG RETAIL</strong><br>
		<small>Branch #001 - Metro Manila</small>
		<small>Mobile: 0950 682 5698</small></div>
        <hr>
        <div style="margin-bottom:1px;">${new Date(s.timestamp).toLocaleString()}</div>
		<div style="margin-top: 5px;">Method:${s.method} <span style="float:right"></span></div><hr>
        ${s.items.map(i => `<div>${i.name}<br><small>&nbsp ${i.qty} x ${i.price.toFixed(2)}</small><span style="float:right">₱${(i.qty*i.price).toFixed(2)}</span></div>`).join('')}
		
		<hr>
        <div>Subtotal: <span style="float:right">₱${s.subtotal.toFixed(2)}</span></div>
		
        ${s.discount > 0 ? `<div>Discount: <span style="float:right">-₱${s.discount.toFixed(2)}</span></div>` : ''}
       <div style="margin-top: 0px;">Payment:<span style="float:right">₱${s.cash.toFixed(2)}</span></div>
        <div>Change: <span style="float:right">₱${s.change.toFixed(2)}</span></div>
        <div style="font-size: 1em;"><strong>TOTAL: <span style="float:right">₱${s.total.toFixed(2)}</span></strong></div>
		 
        <hr><div style="text-align:center; font-size: 0.8em; margin-top: 1px;">Thanks for your purchased.</div>
		<div style="text-align:center; font-size: 0.9em; margin-top: 1px;">Please come again!!</div>
    `;
    window.print();
}

function toggleModal(id) {
    const m = document.getElementById(id);
    m.style.display = (m.style.display === "block") ? "none" : "block";
    if(id === 'salesModal') loadSalesHistory();
    if(id === 'inventoryModal') {
        db.transaction("products").objectStore("products").getAll().onsuccess = e => {
            document.getElementById('invBody').innerHTML = e.target.result.map(v => 
                `<tr><td style="padding:5px;">${v.barcode}</td><td>${v.name}</td><td>₱${v.price.toFixed(2)}</td><td style="color:${v.stock < 10 ? 'red' : 'black'}">${v.stock}</td><td>${v.sold || 0}</td></tr>`
            ).join('');
        };
    }
}

function loadSalesHistory() {
    const filter = document.getElementById('salesFilter').value;
    const tbody = document.getElementById('salesBody');
    const startOfDay = new Date(new Date().setHours(0,0,0,0)).getTime();
    
    db.transaction("sales").objectStore("sales").getAll().onsuccess = e => {
        const filtered = e.target.result.filter(s => filter === 'daily' ? s.timestamp >= startOfDay : true).sort((a, b) => b.timestamp - a.timestamp);
        tbody.innerHTML = filtered.map(s => `<tr><td style="padding:8px;">${new Date(s.timestamp).toLocaleString()}</td><td>${s.items.length} items</td><td>₱${s.total.toFixed(2)}</td><td>${s.method}</td></tr>`).join('');
    };
}

function exportToCSV() {
    // Check if DB is actually ready
    if (!db) {
        alert("Database not ready. Please refresh the page.");
        return;
    }

    try {
        const tx = db.transaction("sales", "readonly");
        const store = tx.objectStore("sales");
        const request = store.getAll();

        request.onsuccess = e => {
            const sales = e.target.result;
            if (!sales || sales.length === 0) {
                alert("No sales data found to export.");
                return;
            }

            // Define Headers - added Subtotal and Tax/Discount fields
            let csv = "\uFEFF"; // Byte Order Mark (BOM) helps Excel read UTF-8 (symbols like ₱)
            csv += "Transaction ID,Date,Items Count,Subtotal,Discount,Total,Method,Details\n";

            sales.forEach(s => {
                const date = new Date(s.timestamp).toLocaleString().replace(/,/g, "");
                const id = s.id || "N/A";
                const itemsCount = s.items ? s.items.length : 0;
                const sub = s.subtotal ? s.subtotal.toFixed(2) : (s.total + (s.discount || 0)).toFixed(2);
                const disc = (s.discount || 0).toFixed(2);
                const total = s.total.toFixed(2);
                const method = s.method || "Cash";
                
                // Details: Clean item names of quotes or commas that break CSV
                const details = s.items ? s.items.map(i => {
                    let cleanName = i.name.replace(/,/g, "").replace(/"/g, "'");
                    return `${cleanName}(x${i.qty})`;
                }).join(" | ") : "";

                csv += `${id},${date},${itemsCount},${sub},${disc},${total},${method},"${details}"\n`;
            });

            // Trigger Download
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement("a");
            
            a.href = url;
            a.download = `Sales_Export_${new Date().toLocaleDateString().replace(/\//g, '-')}.csv`;
            document.body.appendChild(a);
            a.click();
            
            // Cleanup
            setTimeout(() => {
                document.body.removeChild(a);
                window.URL.revokeObjectURL(url);
            }, 100);
        };

        request.onerror = () => alert("Error accessing sales store.");

    } catch (err) {
        console.error(err);
        alert("Export failed: " + err.message);
    }
}
const elem = document.documentElement;

function openFullscreen() {
  if (elem.requestFullscreen) {
    elem.requestFullscreen();
  } else if (elem.webkitRequestFullscreen) { /* Safari */
    elem.webkitRequestFullscreen();
  } else if (elem.msRequestFullscreen) { /* IE11 */
    elem.msRequestFullscreen();
  }
}
